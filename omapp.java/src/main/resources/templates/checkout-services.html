<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1F2A24; --parchment: #F3EFE6; --market-green: #2F6F4E; --market-green-dark: #21503A;
            --tag-gold: #C99A3D; --muted: #6B7268; --card-bg: #FFFFFF; --border: rgba(31, 42, 36, 0.12); --danger: #A6392F;
        }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--parchment); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        header.top-bar {
            background: var(--ink); color: var(--parchment); padding: 28px 6vw;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
        }
        header.top-bar .brand { font-family: 'Bitter', serif; font-weight: 700; font-size: 1.6rem; }
        header.top-bar .brand span { color: var(--tag-gold); }
        header.top-bar nav a { color: rgba(243, 239, 230, 0.8); text-decoration: none; font-size: 0.85rem; }
        header.top-bar nav a:hover { color: var(--parchment); }

        main { max-width: 720px; margin: 0 auto; padding: 40px 6vw 80px; }

        .checkout-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

        .product-media { aspect-ratio: 16/9; background: #eae6db; overflow: hidden; }
        .product-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .product-body { padding: 26px; }
        .category-chip { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; background: rgba(31,42,36,0.08); padding: 3px 9px; border-radius: 4px; margin-bottom: 10px; }
        h1 { font-family: 'Bitter', serif; font-size: 1.4rem; margin: 0 0 6px; }
        .merchant-line { font-size: 0.85rem; color: var(--market-green-dark); font-weight: 600; margin: 0 0 14px; }
        .desc { font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin: 0 0 10px; }
        .availability-hint { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--muted); margin: 0 0 18px; }

        .unit-price { font-family: 'IBM Plex Mono', monospace; font-size: 0.95rem; color: var(--muted); margin-bottom: 4px; }

        .form-divider { border: none; border-top: 1px dashed var(--border); margin: 22px 0; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input {
            width: 100%; font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: 6px; background: var(--parchment);
        }
        .form-group input:focus { outline: 2px solid var(--market-green); outline-offset: 1px; }

        .total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin: 22px 0; padding: 16px 18px; background: var(--parchment); border-radius: 8px;
        }
        .total-row .label { font-family: 'Bitter', serif; font-weight: 700; }
        .total-row .amount { font-family: 'IBM Plex Mono', monospace; font-size: 1.3rem; font-weight: 600; color: var(--market-green-dark); }
        .total-hint { font-size: 0.76rem; color: var(--muted); margin-top: -14px; margin-bottom: 18px; }

        .pay-btn {
            width: 100%; font-family: 'Bitter', serif; font-weight: 700; font-size: 1rem;
            background: var(--market-green); color: #fff; border: none; padding: 14px 20px; border-radius: 8px; cursor: pointer;
        }
        .pay-btn:hover { background: var(--market-green-dark); }

        .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 20px; }
        .alert-error { background: rgba(166, 57, 47, 0.1); color: var(--danger); border: 1px solid rgba(166, 57, 47, 0.3); }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="brand">Market<span>Stall</span></div>
    <nav><a th:href="@{/discover}">← Back to Discover</a></nav>
</header>

<main>
    <div class="alert alert-error" th:if="${checkoutError}" th:text="${checkoutError}"></div>

    <div class="checkout-card">
        <div class="product-media">
            <img th:src="${service.mediaUrl}" th:alt="${service.serviceCategory}" onerror="this.onerror=null;this.src='/assets/NoPhoto.png';">
        </div>
        <div class="product-body">
            <span class="category-chip" th:text="${service.serviceCategory}">Category</span>
            <h1 th:text="${service.serviceCategory}">Service</h1>
            <p class="merchant-line">Provided by <span th:text="${service.merchantName}">Merchant</span></p>
            <p class="desc" th:text="${service.serviceDesc}">Description</p>
            <p class="availability-hint">
                Available <span th:text="${service.availabilityStartTime}">09:00</span>
                – <span th:text="${service.availabilityEndTime}">18:00</span> daily
            </p>
            <p class="unit-price">Rate: <strong th:text="${'₹' + service.pricePerHour + '/hr'}">₹0/hr</strong></p>

            <hr class="form-divider">

            <form th:action="@{'/checkout/services/' + ${service.serviceId}}" th:object="${bookingRequest}" method="post"
                  th:data-price-per-hour="${service.pricePerHour}">
                <div class="form-row">
                    <div class="form-group">
                        <label for="appointmentStartDate">Start Date</label>
                        <input type="date" id="appointmentStartDate" th:field="*{appointmentStartDate}" required oninput="updateTotal()">
                    </div>
                    <div class="form-group">
                        <label for="appointmentEndDate">End Date</label>
                        <input type="date" id="appointmentEndDate" th:field="*{appointmentEndDate}" required oninput="updateTotal()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startingTime">Starting Time</label>
                        <input type="time" id="startingTime" th:field="*{startingTime}"
                               th:min="${service.availabilityStartTime}" th:max="${service.availabilityEndTime}" required>
                    </div>
                    <div class="form-group">
                        <label for="workingHours">Hours per Day</label>
                        <input type="number" id="workingHours" th:field="*{workingHours}" min="1" max="24" step="1" required oninput="updateTotal()">
                    </div>
                </div>

                <div class="total-row">
                    <span class="label">Total</span>
                    <span class="amount" id="totalDisplay">₹0</span>
                </div>
                <p class="total-hint">Total = (end date − start date, in days) × hours per day × hourly rate. Must span at least one full day.</p>

                <button type="submit" class="pay-btn">Pay Now</button>
            </form>
        </div>
    </div>
</main>

<script>
    var form = document.querySelector('form[data-price-per-hour]');
    var pricePerHour = parseFloat(form.dataset.pricePerHour) || 0;

    function updateTotal() {
        var startVal = document.getElementById('appointmentStartDate').value;
        var endVal = document.getElementById('appointmentEndDate').value;
        var hours = parseInt(document.getElementById('workingHours').value, 10) || 0;
        var total = 0;

        if (startVal && endVal) {
            var start = new Date(startVal);
            var end = new Date(endVal);
            var days = Math.round((end - start + 1) / (1000 * 60 * 60 * 24));
            if (days > 0) {
                total = days * hours * pricePerHour;
            }
        }
        document.getElementById('totalDisplay').textContent = '₹' + total.toFixed(2);
    }
    updateTotal();
</script>

</body>
</html>
