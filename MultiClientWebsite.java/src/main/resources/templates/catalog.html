<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1F2A24;
            --parchment: #F3EFE6;
            --market-green: #2F6F4E;
            --market-green-dark: #21503A;
            --tag-gold: #C99A3D;
            --muted: #6B7268;
            --card-bg: #FFFFFF;
            --border: rgba(31, 42, 36, 0.12);
            --danger: #A6392F;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--parchment);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        header.top-bar {
            background: var(--ink);
            color: var(--parchment);
            padding: 28px 6vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        header.top-bar .brand { font-family: 'Bitter', serif; font-weight: 700; font-size: 1.6rem; }
        header.top-bar .brand span { color: var(--tag-gold); }
        header.top-bar nav a {
            color: rgba(243, 239, 230, 0.8);
            text-decoration: none;
            font-size: 0.85rem;
            margin-right: 18px;
        }
        header.top-bar nav a:hover { color: var(--parchment); }

        main { max-width: 1180px; margin: 0 auto; padding: 40px 6vw 80px; }

        .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 32px; }

        .tab-btn {
            font-family: 'Bitter', serif;
            font-weight: 700;
            font-size: 1.05rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 12px 22px;
            color: var(--muted);
            border-radius: 8px 8px 0 0;
        }

        .tab-btn.active {
            color: var(--ink);
            background: var(--card-bg);
            box-shadow: 0 -2px 0 var(--tag-gold) inset;
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--card-bg);
            margin-bottom: -2px;
        }

        .panel { display: none; }
        .panel.active { display: block; animation: rise 0.35s ease; }

        @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .section-header h2 { font-family: 'Bitter', serif; font-size: 1.15rem; margin: 0; }

        .add-toggle-btn {
            font-family: 'Bitter', serif;
            font-weight: 700;
            font-size: 0.9rem;
            background: var(--market-green);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-toggle-btn:hover { background: var(--market-green-dark); }

        .add-form {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 22px;
            margin-bottom: 26px;
        }
        .add-form.open { display: block; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }

        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--parchment);
        }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .form-group input:focus, .form-group textarea:focus { outline: 2px solid var(--market-green); outline-offset: 1px; }

        .submit-btn {
            font-family: 'Bitter', serif;
            font-weight: 700;
            font-size: 0.9rem;
            background: var(--ink);
            color: var(--parchment);
            border: none;
            padding: 11px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .submit-btn:hover { background: #0f1712; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 22px; }

        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .item-media { aspect-ratio: 4/3; background: #eae6db; overflow: hidden; }
        .item-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .item-body { padding: 14px 16px; }
        .item-title { font-family: 'Bitter', serif; font-weight: 700; font-size: 1rem; margin: 0 0 4px; }
        .item-meta { font-size: 0.8rem; color: var(--muted); margin: 0 0 10px; }
        .item-price { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--market-green-dark); margin: 0 0 12px; }

        .edit-link {
            display: inline-block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 20px;
            text-decoration: none;
        }
        .edit-link:hover { background: var(--parchment); }

        .empty-state {
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 50px 20px;
            text-align: center;
            color: var(--muted);
            font-family: 'Bitter', serif;
            margin-bottom: 26px;
        }

        .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 20px; }
        .alert-success { background: rgba(47, 111, 78, 0.12); color: var(--market-green-dark); border: 1px solid rgba(47, 111, 78, 0.3); }
        .alert-error { background: rgba(166, 57, 47, 0.1); color: var(--danger); border: 1px solid rgba(166, 57, 47, 0.3); }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="brand">Market Application</div>
    <nav>
        <a th:href="@{/merchant/dashboard}">← Back to Dashboard</a>
    </nav>
</header>

<main>
    <div class="alert alert-success" th:if="${editSuccess}" th:text="${editSuccess}"></div>
    <div class="alert alert-error" th:if="${catalogError}" th:text="${catalogError}"></div>

    <div class="tabs">
        <button type="button" class="tab-btn active" data-target="goods-panel">Goods</button>
        <button type="button" class="tab-btn" data-target="services-panel">Services</button>
    </div>

    <!-- ================= GOODS ================= -->
    <section id="goods-panel" class="panel active">
        <div class="section-header">
            <h2>My Goods</h2>
            <button type="button" class="add-toggle-btn js-add-toggle" data-target="goods-add-form">+ Add Goods</button>
        </div>

        <div id="goods-add-form" class="add-form">
            <form th:action="@{/merchant/catalog/goods}" th:object="${goodsForm}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="goodsName">Name</label>
                        <input type="text" id="goodsName" th:field="*{goodsName}" required>
                    </div>
                    <div class="form-group">
                        <label for="goodsCategory">Category</label>
                        <input type="text" id="goodsCategory" th:field="*{goodsCategory}" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (₹)</label>
                        <input type="number" step="0.01" min="0" id="price" th:field="*{price}" required>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="goodsDesc">Description</label>
                    <textarea id="goodsDesc" th:field="*{goodsDesc}"></textarea>
                </div>
                <button type="submit" class="submit-btn">Create Listing</button>
            </form>
        </div>

        <div class="grid" th:if="${not #lists.isEmpty(goodsList)}">
            <article class="item-card" th:each="item : ${goodsList}">
                <div class="item-media">
                    <img th:if="${not #lists.isEmpty(item.mediaUrls)}" th:src="${item.mediaUrls[0]}" th:alt="${item.goodsName}"
                         onerror="this.onerror=null;this.src='/assets/NoPhoto.png';">
                    <img th:unless="${not #lists.isEmpty(item.mediaUrls)}" src="/assets/NoPhoto.png" th:alt="${item.goodsName}">
                </div>
                <div class="item-body">
                    <p class="item-title" th:text="${item.goodsName}">Goods</p>
                    <p class="item-meta" th:text="${item.goodsCategory}">Category</p>
                    <p class="item-price" th:text="${'₹' + item.price}">₹0</p>
                    <a class="edit-link" th:href="@{'/merchant/catalog/goods/' + ${item.goodsId} + '/edit'}">Edit</a>
                </div>
            </article>
        </div>
        <div class="empty-state" th:if="${#lists.isEmpty(goodsList)}">You haven't listed any goods yet.</div>
    </section>

    <!-- ================= SERVICES ================= -->
    <section id="services-panel" class="panel">
        <div class="section-header">
            <h2>My Services</h2>
            <button type="button" class="add-toggle-btn js-add-toggle" data-target="services-add-form">+ Add Service</button>
        </div>

        <div id="services-add-form" class="add-form">
            <form th:action="@{/merchant/catalog/services}" th:object="${serviceForm}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="serviceCategory">Category</label>
                        <input type="text" id="serviceCategory" th:field="*{serviceCategory}" required>
                    </div>
                    <div class="form-group">
                        <label for="pricePerHour">Price per hour (₹)</label>
                        <input type="number" step="0.01" min="0" id="pricePerHour" th:field="*{pricePerHour}" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="availabilityStartTime">Available From</label>
                        <input type="time" id="availabilityStartTime" th:field="*{availabilityStartTime}" required>
                    </div>
                    <div class="form-group">
                        <label for="availabilityEndTime">Available Until</label>
                        <input type="time" id="availabilityEndTime" th:field="*{availabilityEndTime}" required>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="serviceDesc">Description</label>
                    <textarea id="serviceDesc" th:field="*{serviceDesc}"></textarea>
                </div>
                <button type="submit" class="submit-btn">Create Listing</button>
            </form>
        </div>

        <div class="grid" th:if="${not #lists.isEmpty(servicesList)}">
            <article class="item-card" th:each="item : ${servicesList}">
                <div class="item-media">
                    <img th:if="${not #lists.isEmpty(item.mediaUrls)}" th:src="${item.mediaUrls[0]}" th:alt="${item.serviceCategory}"
                         onerror="this.onerror=null;this.src='/assets/NoPhoto.png';">
                    <img th:unless="${not #lists.isEmpty(item.mediaUrls)}" src="/assets/NoPhoto.png" th:alt="${item.serviceCategory}">
                </div>
                <div class="item-body">
                    <p class="item-title" th:text="${item.serviceCategory}">Service</p>
                    <p class="item-meta">
                        <span th:text="${item.availabilityStartTime}">09:00</span> – <span th:text="${item.availabilityEndTime}">18:00</span>
                    </p>
                    <p class="item-price" th:text="${'₹' + item.pricePerHour + '/hr'}">₹0/hr</p>
                    <a class="edit-link" th:href="@{'/merchant/catalog/services/' + ${item.serviceId} + '/edit'}">Edit</a>
                </div>
            </article>
        </div>
        <div class="empty-state" th:if="${#lists.isEmpty(servicesList)}">You haven't listed any services yet.</div>
    </section>
</main>

<script>
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById(btn.dataset.target).classList.add('active');
        });
    });

    document.querySelectorAll('.js-add-toggle').forEach(function (btn) {
        btn.addEventListener('click', function () {
            document.getElementById(btn.dataset.target).classList.toggle('open');
        });
    });
</script>

</body>
</html>
