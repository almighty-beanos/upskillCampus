<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Welcome, <span th:text="${profile.customerName}"></span></h1>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">Log out</button>
    </form>
    <br>
    <!-- Success/Error Messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <ul class="nav nav-tabs mb-4" id="dashboardTabs">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#profile">Profile</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#purchases">Purchases & Appointments</a></li>
    </ul>

    <div class="tab-content">
        <!-- Profile Tab -->
        <div class="tab-pane fade show active" id="profile">
            <div class="card">
                <div class="card-body">
                    <h5>Current Details</h5>
                    <p><strong>Name:</strong> <span th:text="${profile.customerName}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${profile.email}"></span></p>
                    <p><strong>Phone:</strong> <span th:text="${profile.phone}"></span></p>
                    <p><strong>Wallet:</strong> <span th:text="${profile.walletBalance}"></span></p>

                    <hr>
                    <h5>Update Profile</h5>
                    <form th:action="@{/customer/dashboard/update}" th:object="${updateDto}" method="post">
                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" class="form-control" th:field="*{customerName}" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="tel" class="form-control" th:field="*{phone}" required>
                        </div>
                        <div class="mb-3">
                            <label>Current Password (required)</label>
                            <input type="password" class="form-control" th:field="*{currentPassword}" required>
                        </div>
                        <div class="mb-3">
                            <label>New Password (optional)</label>
                            <input type="password" class="form-control" th:field="*{newPassword}">
                        </div>
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Purchases Tab -->
        <div class="tab-pane fade" id="purchases">
            <h4>Purchase History</h4>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Item</th>
                        <th>Merchant</th>
                        <th>Qty</th>
                        <th>Unit Price</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${#temporals.format(tx.transactionDate, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${tx.goodsName}"></td>
                        <td th:text="${tx.merchantName}"></td>
                        <td th:text="${tx.quantity}"></td>
                        <td th:text="${'₹' + tx.unitPrice}"></td>
                        <td th:text="${'₹' + tx.totalAmount}"></td>
                    </tr>
                </tbody>
            </table>

            <h4 class="mt-5">Appointment History</h4>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Service</th>
                        <th>Merchant</th>
                        <th>Duration Window</th>
                        <th>Working Hours</th>
                        <th>Rate/Hr</th>
                        <th>Total Cost</th> 
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="apt : ${appointments}">
                        <td th:text="${#temporals.format(apt.appointmentStartDate, 'yyyy-MM-dd')}"></td>
                        <td th:text="${apt.serviceCategory}"></td>
                        <td th:text="${apt.merchantName}"></td>
                        <td>
                            <!-- Added start and end date layout -->
                            <span th:text="${#temporals.format(apt.appointmentStartDate, 'yyyy-MM-dd')}"></span> → 
                            <span th:text="${#temporals.format(apt.appointmentEndDate, 'yyyy-MM-dd')}"></span>
                        </td>
                        <td th:text="${apt.workingHours}"></td>
                        <td th:text="${'₹' + apt.pricePerHour}"></td>
                        <td th:text="${'₹' + apt.totalAmount}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
