<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
        }

        .login-card{
            max-width:450px;
            margin:auto;
            margin-top:80px;
            padding:35px;
            border-radius:15px;
            background:white;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

    </style>

</head>
<body>

<div class="container">

    <div class="login-card">

        <h2 class="text-center mb-4">
            Marketplace Login
        </h2>

        <form th:action="@{/login}"
              th:object="${loginRequest}"
              method="post">

            <div class="mb-3">

                <label>Email</label>

                <input
                        type="email"
                        class="form-control"
                        th:field="*{email}"
                        required>

            </div>


            <div class="mb-3">

                <label>Password</label>

                <input
                        type="password"
                        class="form-control"
                        th:field="*{password}"
                        required>

            </div>


            <div class="mb-4">

                <label>Login As</label>

                <select
                        class="form-select"
                        th:field="*{role}"
                        required>

                    <option value="">Select Role</option>

                    <option th:value="${T(com.example.omapp.security.Role).CUSTOMER}">
                        Customer
                    </option>

                    <option th:value="${T(com.example.omapp.security.Role).MERCHANT}">
                        Merchant
                    </option>

                </select>

            </div>

            <div th:if="${error}" style="color:red;">
                <span th:text="${error}"></span>
            </div>

            <button
                    type="submit"
                    class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <hr>

        <p class="text-center">
            Don't have an account?

            <a th:href="@{/signup}">
                Sign Up
            </a>
        </p>

    </div>

</div>

</body>
</html>
