<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1F2A24;
            --parchment: #F3EFE6;
            --market-green: #2F6F4E;
            --market-green-dark: #21503A;
            --tag-gold: #C99A3D;
            --muted: #6B7268;
            --card-bg: #FFFFFF;
            --border: rgba(31, 42, 36, 0.12);
            --danger: #A6392F;
        }

        * { box-sizing: border-box; }

        body { margin: 0; background: var(--parchment); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        header.top-bar {
            background: var(--ink); color: var(--parchment); padding: 28px 6vw;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
        }
        header.top-bar .brand { font-family: 'Bitter', serif; font-weight: 700; font-size: 1.6rem; }
        header.top-bar .brand span { color: var(--tag-gold); }
        header.top-bar nav a { color: rgba(243, 239, 230, 0.8); text-decoration: none; font-size: 0.85rem; }
        header.top-bar nav a:hover { color: var(--parchment); }

        main { max-width: 880px; margin: 0 auto; padding: 40px 6vw 80px; }

        h1 { font-family: 'Bitter', serif; font-size: 1.4rem; margin: 0 0 24px; }
        h2 { font-family: 'Bitter', serif; font-size: 1.05rem; margin: 0 0 16px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 26px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }

        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%; font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: 6px; background: var(--parchment);
        }
        .form-group textarea { resize: vertical; min-height: 90px; }
        .form-group input:focus, .form-group textarea:focus { outline: 2px solid var(--market-green); outline-offset: 1px; }

        .submit-btn {
            font-family: 'Bitter', serif; font-weight: 700; font-size: 0.9rem;
            background: var(--market-green); color: #fff; border: none; padding: 11px 20px; border-radius: 6px; cursor: pointer;
        }
        .submit-btn:hover { background: var(--market-green-dark); }

        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-bottom: 22px; }

        .media-item { position: relative; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; aspect-ratio: 1; background: #eae6db; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .media-delete-form { position: absolute; top: 6px; right: 6px; }
        .media-delete-btn {
            background: rgba(31, 42, 36, 0.75); color: #fff; border: none; border-radius: 50%;
            width: 26px; height: 26px; font-size: 0.85rem; cursor: pointer; line-height: 1;
        }
        .media-delete-btn:hover { background: var(--danger); }

        .upload-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .upload-row input[type="file"] {
            font-family: 'Inter', sans-serif; font-size: 0.85rem; padding: 8px; border: 1px solid var(--border);
            border-radius: 6px; background: var(--parchment); flex: 1 1 220px;
        }

        .empty-media { color: var(--muted); font-size: 0.85rem; margin-bottom: 16px; }

        .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 20px; }
        .alert-success { background: rgba(47, 111, 78, 0.12); color: var(--market-green-dark); border: 1px solid rgba(47, 111, 78, 0.3); }
        .alert-error { background: rgba(166, 57, 47, 0.1); color: var(--danger); border: 1px solid rgba(166, 57, 47, 0.3); }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="brand">Market Application</div>
    <nav><a th:href="@{/merchant/catalog}">← Back to Catalog</a></nav>
</header>

<main>
    <h1 th:text="'Edit: ' + ${service.serviceCategory}">Edit Service</h1>

    <div class="alert alert-success" th:if="${editSuccess}" th:text="${editSuccess}"></div>
    <div class="alert alert-error" th:if="${editError}" th:text="${editError}"></div>

    <div class="card">
        <h2>Details</h2>
        <form th:action="@{'/merchant/catalog/services/' + ${service.serviceId}}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="serviceCategory">Category</label>
                    <input type="text" id="serviceCategory" name="serviceCategory" th:value="${service.serviceCategory}" required>
                </div>
                <div class="form-group">
                    <label for="pricePerHour">Price per hour (₹)</label>
                    <input type="number" step="0.01" min="0" id="pricePerHour" name="pricePerHour" th:value="${service.pricePerHour}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="availabilityStartTime">Available from</label>
                    <input type="time" id="availabilityStartTime" name="availabilityStartTime" th:value="${service.availabilityStartTime}" required>
                </div>
                <div class="form-group">
                    <label for="availabilityEndTime">Available until</label>
                    <input type="time" id="availabilityEndTime" name="availabilityEndTime" th:value="${service.availabilityEndTime}" required>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="serviceDesc">Description</label>
                <textarea id="serviceDesc" name="serviceDesc" th:text="${service.serviceDesc}"></textarea>
            </div>
            <button type="submit" class="submit-btn">Save Changes</button>
        </form>
    </div>

    <div class="card">
        <h2>Media</h2>

        <div class="media-grid" th:if="${not #lists.isEmpty(service.mediaUrls)}">
            <div class="media-item" th:each="url : ${service.mediaUrls}">
                <video th:if="${#strings.toLowerCase(url).endsWith('.mp4') or #strings.toLowerCase(url).endsWith('.mov') or #strings.toLowerCase(url).endsWith('.webm')}"
                       th:src="${url}" muted></video>
                <img th:unless="${#strings.toLowerCase(url).endsWith('.mp4') or #strings.toLowerCase(url).endsWith('.mov') or #strings.toLowerCase(url).endsWith('.webm')}"
                     th:src="${url}" alt="Service media" onerror="this.onerror=null;this.src='/assets/NoPhoto.png';">
                <form class="media-delete-form" th:action="@{'/merchant/catalog/services/' + ${service.serviceId} + '/media/delete'}" method="post">
                    <input type="hidden" name="mediaUrl" th:value="${url}">
                    <button type="submit" class="media-delete-btn" title="Delete" onclick="return confirm('Remove this media file?');">✕</button>
                </form>
            </div>
        </div>
        <p class="empty-media" th:if="${#lists.isEmpty(service.mediaUrls)}">No photos or videos yet.</p>

        <form class="upload-row" th:action="@{'/merchant/catalog/services/' + ${service.serviceId} + '/media'}" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*,video/*" required>
            <button type="submit" class="submit-btn">Upload</button>
        </form>
    </div>
</main>

</body>
</html>
