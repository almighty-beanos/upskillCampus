<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .signup-card{

            max-width:550px;
            margin:auto;
            margin-top:40px;

            background:white;

            padding:40px;

            border-radius:15px;

            box-shadow:0 10px 30px rgba(0,0,0,.1);

        }

    </style>

</head>

<body>

<div class="container">

    <div class="signup-card">

        <h2 class="text-center mb-4">

            Create Account

        </h2>

        <form
                th:action="@{/signup}"
                th:object="${signupRequest}"
                method="post">


            <div class="mb-3">

                <label>Name</label>

                <input
                        type="text"
                        class="form-control"
                        th:field="*{name}"
                        required>

            </div>



            <div class="mb-3">

                <label>Email</label>

                <input
                        type="email"
                        class="form-control"
                        th:field="*{email}"
                        required>

            </div>



            <div class="mb-3">

                <label>Phone</label>

                <input
                        type="text"
                        class="form-control"
                        th:field="*{phone}"
                        required>

            </div>



            <div class="mb-3">

                <label>Password</label>

                <input
                        type="password"
                        class="form-control"
                        th:field="*{password}"
                        required>

            </div>



            <div class="mb-4">

                <label>Register As</label>

                <select
                        class="form-select"
                        th:field="*{role}"
                        required>

                    <option value="">
                        Select Role
                    </option>

                    <option th:value="${T(com.example.omapp.security.Role).CUSTOMER}">
                        Customer
                    </option>

                    <option th:value="${T(com.example.omapp.security.Role).MERCHANT}">
                        Merchant
                    </option>

                </select>

            </div>

            <div th:if="${error}" style="color:red;">
                <span th:text="${error}"></span>
            </div>


            <button
                    type="submit"
                    class="btn btn-success w-100">

                Create Account

            </button>

        </form>

        <hr>

        <p class="text-center">

            Already have an account?

            <a th:href="@{/login}">
                Login
            </a>

        </p>

    </div>

</div>

</body>
</html>
